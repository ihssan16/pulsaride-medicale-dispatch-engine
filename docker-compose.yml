services:
  api:
    build:
      context: ./backend
    container_name: pulsaride-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pulsaride
      SPRING_DATASOURCE_USERNAME: pulsaride
      SPRING_DATASOURCE_PASSWORD: pulsaride123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PULSARIDE_SIMULATOR_DATA_DIR: /data
    ports:
      - "8080:8080"
    volumes:
      - ./simulator/data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg15
    container_name: pulsaride-postgres
    environment:
      POSTGRES_DB: pulsaride
      POSTGRES_USER: pulsaride
      POSTGRES_PASSWORD: pulsaride123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsaride -d pulsaride"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pulsaride-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
