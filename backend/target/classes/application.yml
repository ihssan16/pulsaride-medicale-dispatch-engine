spring:
  application:
    name: pulsaride-dispatch-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pulsaride}
    username: ${SPRING_DATASOURCE_USERNAME:pulsaride}
    password: ${SPRING_DATASOURCE_PASSWORD:pulsaride123}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

pulsaride:
  ai:
    mode: ${AI_MODE:mock}
  dispatch:
    proposal-timeout-seconds: ${PULSARIDE_PROPOSAL_TIMEOUT_SECONDS:30}
    timeout-scan-ms: ${PULSARIDE_TIMEOUT_SCAN_MS:5000}
  seed-data:
    enabled: ${PULSARIDE_SEED_DATA:true}
    simulator-data-dir: ${PULSARIDE_SIMULATOR_DATA_DIR:../simulator/data}
